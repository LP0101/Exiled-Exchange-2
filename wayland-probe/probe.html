<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>probe</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }
  body {
    color: #f1c40f;
    font-family: monospace;
    font-size: 16px;
    border: 4px solid #f1c40f;
    box-sizing: border-box;
    padding: 8px;
    background: rgba(0, 0, 0, 0.35);
  }
  .row { margin-bottom: 4px; }
  .label { color: #95a5a6; }
  #click-zone {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 140px;
    height: 40px;
    background: rgba(231, 76, 60, 0.65);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #c0392b;
    user-select: none;
  }
  #click-zone.clicked { background: rgba(46, 204, 113, 0.65); border-color: #27ae60; }
</style>
</head>
<body>
  <div class="row"><span class="label">OVERLAY PROBE (self-tracking)</span></div>
  <div class="row">Anchored inside PoE2's window (offset 100,100) via KWin DBus.</div>
  <div class="row"><span class="label">F8</span> toggles click-through</div>
  <div class="row"><span class="label">F9</span> pings (see terminal)</div>
  <div class="row"><span class="label">Ctrl+Shift+Q</span> quits the probe</div>
  <div class="row"><span class="label">clock:</span> <span id="ts">--</span></div>
  <div id="click-zone">click me</div>
  <script>
    const tsEl = document.getElementById("ts");
    setInterval(() => { tsEl.textContent = new Date().toLocaleTimeString(); }, 500);
    const zone = document.getElementById("click-zone");
    zone.addEventListener("click", () => {
      zone.classList.add("clicked");
      zone.textContent = "clicked!";
      setTimeout(() => {
        zone.classList.remove("clicked");
        zone.textContent = "click me";
      }, 800);
    });
  </script>
</body>
</html>
